<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Salesforce Validation Rules</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <h2>Salesforce Validation Rule Manager</h2>

  <div class="login-box">
    <input id="clientId" type="text" placeholder="Consumer Key (Client ID)" />
    <input id="clientSecret" type="password" placeholder="Consumer Secret (Client Secret)" />
    <select id="loginUrl">
      <option value="https://login.salesforce.com">Production / Developer Org</option>
      <option value="https://test.salesforce.com">Sandbox</option>
    </select>
    <button onclick="login()">🔐 Login with Salesforce</button>
    <button class="logout-btn" onclick="window.location.href='/logout'">🚪 Logout</button>
  </div>

  <h3>Validation Rules (Account Object)</h3>
  <div id="rulesContainer">
    <p>Login first to see validation rules.</p>
  </div>

</div>

<script src="app.js"></script>
</body>
</html>
