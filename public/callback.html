<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Salesforce Callback</title>
    <link rel="stylesheet" href="style.css?v=2">
</head>
<body>

<div class="callback-box">
    <h2>Salesforce OAuth Callback</h2>
    <div id="tokenDisplay"></div>
</div>

<script>
    const hash = window.location.hash;
    const params = new URLSearchParams(hash.substring(1));
    const accessToken = params.get('access_token');

    if (accessToken) {
        document.getElementById('tokenDisplay').innerText = "Access Token: " + accessToken;
        console.log("Salesforce Access Token:", accessToken);
    } else {
        document.getElementById('tokenDisplay').innerText = "No access token found.";
    }
</script>

</body>
</html>
